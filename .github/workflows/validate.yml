name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: none
          coverage: none

      - name: Validate PHP syntax
        shell: bash
        run: |
          set -euo pipefail
          find . -path './.git' -prune -o -path './vendor' -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          if find assets -name '*.js' -print -quit | grep -q .; then
            find assets -name '*.js' -print0 | xargs -0 -n1 node --check
          fi